<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vega API - 配置管理</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-input: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --success: #3fb950;
    --warning: #d29922;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header {
    text-align: center; padding: 40px 0 30px;
    border-bottom: 1px solid var(--border); margin-bottom: 30px;
  }
  .header h1 { font-size: 24px; color: var(--accent); margin-bottom: 8px; }
  .header p { color: var(--text-muted); font-size: 14px; }
  .header .badge { display: inline-block; padding: 2px 10px; border-radius: 12px;
    background: rgba(88,166,255,.15); color: var(--accent); font-size: 12px;
    margin-left: 8px; }

  /* Login */
  #login-screen {
    max-width: 400px; margin: 80px auto; text-align: center;
  }
  #login-screen h2 { margin-bottom: 20px; font-size: 20px; }
  #login-screen .card { padding: 30px; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .form-group { margin-bottom: 14px; text-align: left; }
  .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px 12px; font-size: 14px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-input); color: var(--text);
    font-family: inherit;
  }
  .form-group textarea { min-height: 80px; resize: vertical; font-family: monospace; font-size: 12px; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.15);
  }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .btn {
    display: inline-block; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 14px; font-family: inherit; cursor: pointer; transition: all .15s;
    background: var(--bg-input); color: var(--text); text-decoration: none;
  }
  .btn:hover { background: #30363d; }
  .btn-primary { background: #238636; color: #fff; border-color: #238636; }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger { background: #da3633; color: #fff; border-color: #da3633; }
  .btn-danger:hover { background: #f85149; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
  .error.show { display: block; }
  .success-msg { color: var(--success); font-size: 13px; margin-top: 8px; display: none; }
  .success-msg.show { display: block; }

  /* Provider cards */
  .provider-list { display: flex; flex-direction: column; gap: 12px; }
  .provider-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    transition: border-color .2s;
  }
  .provider-card:hover { border-color: var(--accent); }
  .provider-card.disabled { opacity: .5; }
  .provider-type {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  }
  .type-vertex_ai { background: rgba(88,166,255,.15); color: var(--accent); }
  .type-google_ai_studio { background: rgba(63,185,80,.15); color: var(--success); }
  .type-openai { background: rgba(210,153,34,.15); color: var(--warning); }
  .provider-info { flex: 1; min-width: 0; }
  .provider-info .name { font-weight: 600; font-size: 15px; }
  .provider-info .models { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .provider-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto;
    margin: 20px;
  }
  .modal h3 { margin-bottom: 16px; font-size: 18px; }
  .modal .form-group label { font-size: 12px; font-weight: 500; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent;
    font-size: 14px; color: var(--text-muted); transition: all .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 200;
    padding: 12px 20px; border-radius: 8px; font-size: 14px; color: #fff;
    transform: translateX(120%); transition: transform .3s ease;
  }
  .toast.show { transform: translateX(0); }
  .toast-success { background: #238636; }
  .toast-error { background: #da3633; }

  /* Responsive */
  @media (max-width: 600px) {
    .provider-card { flex-wrap: wrap; }
    .provider-actions { width: 100%; justify-content: flex-end; }
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- ========== Login Screen ========== -->
  <div id="login-screen">
    <div class="header">
      <h1>🔑 Vega API</h1>
      <p>配置管理面板 <span class="badge">Admin</span></p>
    </div>
    <div class="card">
      <h2>管理员登录</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="login-password">管理密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" autofocus>
        </div>
        <div id="login-error" class="error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">登 录</button>
      </form>
      <p style="margin-top:12px;font-size:12px;color:var(--text-muted);">
        首次使用？输入新密码即可设置管理密码。
      </p>
    </div>
  </div>

  <!-- ========== Main Screen ========== -->
  <div id="main-screen" style="display:none;">
    <div class="header">
      <h1>🔑 Vega API</h1>
      <p>配置管理面板 <span class="badge">Admin</span></p>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:18px;">API 提供商</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="showAddModal()">+ 添加提供商</button>
        <button class="btn" onclick="showChangePassword()" title="修改密码">🔒</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">退出</button>
      </div>
    </div>

    <!-- Client API Key Card -->
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <strong style="font-size:15px;">🔑 客户端 API Key</strong>
          <span style="font-size:12px;color:var(--text-muted);margin-left:8px;">用于调用 /v1/* 接口</span>
        </div>
        <div style="display:flex;gap:8px;" id="apikey-actions">
          <button class="btn btn-sm" onclick="generateApiKey()" id="btn-generate-key">🎲 随机生成</button>
          <button class="btn btn-sm" onclick="showSetApiKey()">✏️ 自行设置</button>
        </div>
      </div>
      <div id="apikey-display" style="margin-top:10px;font-size:13px;color:var(--text-muted);">
        加载中...
      </div>
      <div id="apikey-input-row" style="display:none;margin-top:10px;gap:8px;align-items:center;">
        <input type="text" id="apikey-input" placeholder="输入 API Key（至少8位）" style="flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:13px;">
        <button class="btn btn-primary btn-sm" onclick="saveApiKey()">💾 保存</button>
        <button class="btn btn-sm" onclick="cancelSetApiKey()">取消</button>
      </div>
      <div id="apikey-full-display" style="display:none;margin-top:10px;padding:10px;background:var(--bg-input);border-radius:6px;font-family:monospace;font-size:13px;word-break:break-all;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span id="apikey-full-text" style="color:var(--success);"></span>
          <button class="btn btn-sm" onclick="copyApiKey()">📋 复制</button>
        </div>
        <span style="font-size:11px;color:var(--warning);">⚠️ 此密钥仅显示一次，请立即复制保存</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;" id="apikey-secondary-actions">
        <button class="btn btn-sm" style="color:var(--danger);font-size:11px;" onclick="deleteApiKey()" id="btn-delete-key" style="display:none;">🗑 删除密钥（公开访问）</button>
      </div>
    </div>

    <div id="provider-list" class="provider-list">
      <div class="card" style="text-align:center;color:var(--text-muted);">加载中...</div>
    </div>
  </div>
</div>

<!-- ========== Add/Edit Modal ========== -->
<div id="provider-modal" class="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">添加提供商</h3>
    <form id="provider-form">
      <input type="hidden" id="prov-id">
      <div class="form-group">
        <label>提供商类型 *</label>
        <select id="prov-type" required onchange="onTypeChange()">
          <option value="">请选择...</option>
          <option value="vertex_ai">Google Vertex AI</option>
          <option value="google_ai_studio">Google AI Studio</option>
          <option value="openai">OpenAI 官方</option>
        </select>
      </div>
      <div class="form-group">
        <label>名称 *</label>
        <input type="text" id="prov-name" placeholder="如：Vertex AI Primary" required>
      </div>
      <div class="form-group">
        <label>提供商 ID *</label>
        <input type="text" id="prov-id-display" placeholder="如：vertex-1" required>
      </div>

      <!-- Vertex AI fields -->
      <div id="fields-vertex" class="type-fields" style="display:none;">
        <div class="form-row">
          <div class="form-group">
            <label>项目 ID *</label>
            <input type="text" id="v-project-id" placeholder="Google Cloud Project ID">
          </div>
          <div class="form-group">
            <label>区域</label>
            <input type="text" id="v-location" placeholder="us-central1" value="us-central1">
          </div>
        </div>
        <div class="form-group">
          <label>服务账号邮箱 *</label>
          <input type="text" id="v-sa-email" placeholder="xxx@yyy.iam.gserviceaccount.com">
        </div>
        <div class="form-group">
          <label>私钥 (PEM) *</label>
          <textarea id="v-private-key" placeholder="-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----"></textarea>
        </div>
      </div>

      <!-- AI Studio / OpenAI fields -->
      <div id="fields-apikey" class="type-fields" style="display:none;">
        <div class="form-group">
          <label>API Key *</label>
          <input type="password" id="f-api-key" placeholder="输入 API Key">
        </div>
      </div>

      <!-- OpenAI extra fields -->
      <div id="fields-openai-extra" class="type-fields" style="display:none;">
        <div class="form-group">
          <label>自定义 Base URL（可选）</label>
          <input type="text" id="o-base-url" placeholder="https://api.openai.com/v1">
        </div>
      </div>

      <!-- Common fields -->
      <div class="form-group" style="font-size:12px;color:var(--text-muted);padding:8px 0;">
        💡 模型列表将自动从提供商 API 获取，无需手动配置。
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>权重</label>
          <input type="number" id="prov-weight" value="1" min="0" max="100">
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end;gap:12px;">
          <label style="margin-bottom:0;">
            <input type="checkbox" id="prov-enabled" checked> 启用
          </label>
        </div>
      </div>

      <div id="modal-error" class="error"></div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
        <button type="button" class="btn" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">保 存</button>
      </div>
    </form>
  </div>
</div>

<!-- ========== Change Password Modal ========== -->
<div id="password-modal" class="modal-overlay">
  <div class="modal">
    <h3>修改管理密码</h3>
    <form id="password-form">
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="cp-current" required>
      </div>
      <div class="form-group">
        <label>新密码（至少6位）</label>
        <input type="password" id="cp-new" required minlength="6">
      </div>
      <div id="cp-error" class="error"></div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
        <button type="button" class="btn" onclick="closePwdModal()">取消</button>
        <button type="submit" class="btn btn-primary">修改密码</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ==================== State ====================
let authToken = "";
let providers = [];
let editingId = null;

// ==================== Init ====================
document.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("admin_token");
  if (saved) {
    authToken = saved;
    checkAuthAndLoad();
  }
});

// ==================== Auth ====================
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.classList.remove("show");

  try {
    const resp = await fetch("/admin/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password }),
    });
    const data = await resp.json();

    if (resp.ok && data.token) {
      authToken = data.token;
      localStorage.setItem("admin_token", authToken);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("main-screen").style.display = "block";
      loadProviders();
      loadApiKey();
      if (data.message) showToast(data.message, "success");
    } else {
      errEl.textContent = data.error || "登录失败";
      errEl.classList.add("show");
      if (data.banned) {
        errEl.textContent += `（封禁剩余 ${Math.ceil(data.remainingSeconds/60)} 分钟）`;
      } else if (data.remaining) {
        errEl.textContent += `（剩余 ${data.remaining} 次尝试）`;
      }
    }
  } catch (err) {
    errEl.textContent = "网络错误: " + err.message;
    errEl.classList.add("show");
  }
});

async function checkAuthAndLoad() {
  try {
    const resp = await fetch("/admin/check", {
      headers: { Authorization: `Bearer ${authToken}` },
    });
    if (resp.ok) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("main-screen").style.display = "block";
      loadProviders();
      loadApiKey();
    } else {
      localStorage.removeItem("admin_token");
      authToken = "";
    }
  } catch {
    // stay on login screen
  }
}

function logout() {
  localStorage.removeItem("admin_token");
  authToken = "";
  document.getElementById("login-screen").style.display = "";
  document.getElementById("main-screen").style.display = "none";
  showToast("已退出登录", "success");
}

// ==================== Provider List ====================
async function loadProviders() {
  try {
    const resp = await fetch("/admin/providers", {
      headers: { Authorization: `Bearer ${authToken}` },
    });
    if (resp.status === 401) { logout(); return; }
    providers = await resp.json();
    renderProviderList();
  } catch (err) {
    console.error("Failed to load providers:", err);
  }
}

function renderProviderList() {
  const container = document.getElementById("provider-list");
  if (!providers.length) {
    container.innerHTML = `<div class="card" style="text-align:center;color:var(--text-muted);">
      暂无提供商。点击"添加提供商"开始配置。
    </div>`;
    return;
  }

  const typeLabels = {
    vertex_ai: "Vertex AI",
    google_ai_studio: "AI Studio",
    openai: "OpenAI",
  };

  container.innerHTML = providers.map((p) => {
    const typeClass = "type-" + p.type;
    const typeLabel = typeLabels[p.type] || p.type;
    const disabledClass = p.enabled ? "" : "disabled";
    const statusBadge = p.enabled
      ? `<span style="color:var(--success);font-size:12px;">● 启用</span>`
      : `<span style="color:var(--text-muted);font-size:12px;">○ 禁用</span>`;
    const modelsPreview = "自动从 API 获取";

    return `<div class="provider-card ${disabledClass}">
      <span class="provider-type ${typeClass}">${typeLabel}</span>
      <div class="provider-info">
        <div class="name">${esc(p.name)} ${statusBadge}</div>
        <div class="models">${esc(modelsPreview)}</div>
      </div>
      <div class="provider-actions">
        <button class="btn btn-sm" onclick="editProvider('${escAttr(p.id)}')">✏️ 编辑</button>
        <button class="btn btn-sm" style="color:var(--warning);" onclick="toggleProvider('${escAttr(p.id)}')">
          ${p.enabled ? "⏸ 禁用" : "▶ 启用"}
        </button>
        <button class="btn btn-sm btn-danger" onclick="deleteProvider('${escAttr(p.id)}')">🗑</button>
      </div>
    </div>`;
  }).join("");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function escAttr(s) {
  return String(s).replace(/'/g,"&#39;").replace(/"/g,"&quot;");
}

// ==================== CRUD Operations ====================
function showAddModal() {
  editingId = null;
  document.getElementById("modal-title").textContent = "添加提供商";
  document.getElementById("provider-form").reset();
  document.getElementById("prov-id").value = "";
  document.getElementById("prov-id-display").value = "";
  document.getElementById("prov-id-display").disabled = false;
  document.getElementById("prov-type").disabled = false;
  document.getElementById("prov-enabled").checked = true;
  document.getElementById("prov-weight").value = 1;
  hideAllTypeFields();
  document.getElementById("modal-error").classList.remove("show");
  document.getElementById("provider-modal").classList.add("show");
}

function editProvider(id) {
  const p = providers.find(x => x.id === id);
  if (!p) return;

  editingId = id;
  document.getElementById("modal-title").textContent = "编辑提供商: " + p.name;
  document.getElementById("prov-id").value = p.id;
  document.getElementById("prov-id-display").value = p.id;
  document.getElementById("prov-id-display").disabled = true;
  document.getElementById("prov-type").value = p.type;
  document.getElementById("prov-type").disabled = true;
  document.getElementById("prov-name").value = p.name;
  document.getElementById("prov-weight").value = p.weight || 1;
  document.getElementById("prov-enabled").checked = p.enabled;

  hideAllTypeFields();
  onTypeChange();

  // Fill type-specific fields (leave sensitive fields empty - user re-enters if changing)
  const cfg = p.config || {};
  if (p.type === "vertex_ai") {
    document.getElementById("v-project-id").value = cfg.projectId || "";
    document.getElementById("v-location").value = cfg.location || "us-central1";
    document.getElementById("v-sa-email").value = cfg.serviceAccountEmail || "";
    document.getElementById("v-private-key").value = "";  // Never show - user re-enters to change
    document.getElementById("v-private-key").placeholder = "（已设置，留空则不修改）";
  } else if (p.type === "google_ai_studio") {
    document.getElementById("f-api-key").value = "";  // Never show
    document.getElementById("f-api-key").placeholder = "（已设置，留空则不修改）";
  } else if (p.type === "openai") {
    document.getElementById("f-api-key").value = "";  // Never show
    document.getElementById("f-api-key").placeholder = "（已设置，留空则不修改）";
    document.getElementById("o-base-url").value = cfg.baseUrl || "";
  }

  document.getElementById("modal-error").classList.remove("show");
  document.getElementById("provider-modal").classList.add("show");
}

function closeModal() {
  document.getElementById("provider-modal").classList.remove("show");
}

function hideAllTypeFields() {
  document.querySelectorAll(".type-fields").forEach(el => el.style.display = "none");
}

function onTypeChange() {
  hideAllTypeFields();
  const type = document.getElementById("prov-type").value;
  if (type === "vertex_ai") {
    document.getElementById("fields-vertex").style.display = "";
  } else if (type === "google_ai_studio") {
    document.getElementById("fields-apikey").style.display = "";
  } else if (type === "openai") {
    document.getElementById("fields-apikey").style.display = "";
    document.getElementById("fields-openai-extra").style.display = "";
  }
}

document.getElementById("provider-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = document.getElementById("modal-error");
  errEl.classList.remove("show");

  const type = document.getElementById("prov-type").value;
  const name = document.getElementById("prov-name").value.trim();
  let id = document.getElementById("prov-id-display").value.trim() || document.getElementById("prov-id").value.trim();

  if (!type || !name || !id) {
    errEl.textContent = "请填写所有必填字段";
    errEl.classList.add("show");
    return;
  }

  // Generate ID if adding new
  if (!editingId) {
    id = id || (type + "-" + Date.now());
  }

  // Build config
  const config = {};
  if (type === "vertex_ai") {
    config.projectId = document.getElementById("v-project-id").value.trim();
    config.location = document.getElementById("v-location").value.trim() || "us-central1";
    config.serviceAccountEmail = document.getElementById("v-sa-email").value.trim();
    config.privateKey = document.getElementById("v-private-key").value.trim();
  } else if (type === "google_ai_studio") {
    config.apiKey = document.getElementById("f-api-key").value.trim();
  } else if (type === "openai") {
    config.apiKey = document.getElementById("f-api-key").value.trim();
    config.baseUrl = document.getElementById("o-base-url").value.trim() || "";
  }

  const body = {
    id,
    type,
    name,
    enabled: document.getElementById("prov-enabled").checked,
    weight: parseInt(document.getElementById("prov-weight").value) || 1,
    config,
    models: [],  // Models are auto-fetched from provider API
  };

  try {
    const method = editingId ? "PUT" : "POST";
    const url = editingId ? `/admin/providers/${encodeURIComponent(editingId)}` : "/admin/providers";
    const resp = await fetch(url, {
      method,
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${authToken}`,
      },
      body: JSON.stringify(body),
    });

    if (resp.ok) {
      closeModal();
      loadProviders();
      showToast(editingId ? "提供商已更新" : "提供商已添加", "success");
    } else {
      const data = await resp.json();
      errEl.textContent = data.error || "保存失败";
      errEl.classList.add("show");
    }
  } catch (err) {
    errEl.textContent = "网络错误: " + err.message;
    errEl.classList.add("show");
  }
});

async function toggleProvider(id) {
  const p = providers.find(x => x.id === id);
  if (!p) return;
  try {
    const resp = await fetch(`/admin/providers/${encodeURIComponent(id)}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${authToken}`,
      },
      body: JSON.stringify({ ...p, enabled: !p.enabled, config: p.config }),
    });
    if (resp.ok) { loadProviders(); showToast(p.enabled ? "已禁用" : "已启用", "success"); }
  } catch (err) {
    showToast("操作失败: " + err.message, "error");
  }
}

async function deleteProvider(id) {
  const p = providers.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`确定要删除提供商 "${p.name}" 吗？\\n此操作不可撤销。`)) return;

  try {
    const resp = await fetch(`/admin/providers/${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: { Authorization: `Bearer ${authToken}` },
    });
    if (resp.ok) { loadProviders(); showToast("已删除", "success"); }
  } catch (err) {
    showToast("删除失败: " + err.message, "error");
  }
}

// ==================== Change Password ====================
function showChangePassword() {
  document.getElementById("password-modal").classList.add("show");
}
function closePwdModal() {
  document.getElementById("password-modal").classList.remove("show");
}
document.getElementById("password-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = document.getElementById("cp-error");
  errEl.classList.remove("show");

  try {
    const resp = await fetch("/admin/change-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${authToken}`,
      },
      body: JSON.stringify({
        currentPassword: document.getElementById("cp-current").value,
        newPassword: document.getElementById("cp-new").value,
      }),
    });
    const data = await resp.json();
    if (resp.ok) {
      authToken = data.token;
      localStorage.setItem("admin_token", authToken);
      closePwdModal();
      showToast("密码已修改", "success");
    } else {
      errEl.textContent = data.error || "修改失败";
      errEl.classList.add("show");
    }
  } catch (err) {
    errEl.textContent = "网络错误: " + err.message;
    errEl.classList.add("show");
  }
});

// ==================== Toast ====================
let toastTimer;
function showToast(msg, type) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast toast-" + type + " show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.classList.remove("show"); }, 3000);
}

// ==================== Client API Key ====================
async function loadApiKey() {
  try {
    const resp = await fetch("/admin/client-key", {
      headers: { Authorization: `Bearer ${authToken}` },
    });
    const data = await resp.json();
    const display = document.getElementById("apikey-display");
    const deleteBtn = document.getElementById("btn-delete-key");
    if (data.configured) {
      display.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span>当前密钥：</span>
          <code style="color:var(--accent);">${esc(data.masked)}</code>
          <span style="color:var(--text-muted);">(${data.length} 字符)</span>
          <button class="btn btn-sm" onclick="revealApiKey()" style="font-size:11px;">👁️ 查看</button>
        </div>`;
      deleteBtn.style.display = "";
    } else {
      display.innerHTML = '<span style="color:var(--warning);">⚠️ 未设置密钥 — /v1/* 接口可公开访问</span>';
      deleteBtn.style.display = "none";
    }
    document.getElementById("apikey-full-display").style.display = "none";
  } catch (err) {
    console.error("Failed to load API key:", err);
  }
}

async function revealApiKey() {
  try {
    const resp = await fetch("/admin/client-key?reveal=true", {
      headers: { Authorization: `Bearer ${authToken}` },
    });
    const data = await resp.json();
    if (resp.ok && data.fullKey) {
      document.getElementById("apikey-full-text").textContent = data.fullKey;
      document.getElementById("apikey-full-display").style.display = "";
      showToast("密钥已显示", "success");
    }
  } catch (err) {
    showToast("获取失败: " + err.message, "error");
  }
}

async function generateApiKey() {
  try {
    const resp = await fetch("/admin/client-key", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${authToken}`,
      },
      body: JSON.stringify({ generate: true }),
    });
    const data = await resp.json();
    if (resp.ok && data.fullKey) {
      document.getElementById("apikey-full-text").textContent = data.fullKey;
      document.getElementById("apikey-full-display").style.display = "";
      loadApiKey();
      showToast("密钥已生成", "success");
    } else {
      showToast(data.error || "操作失败", "error");
    }
  } catch (err) {
    showToast("操作失败: " + err.message, "error");
  }
}

function showSetApiKey() {
  document.getElementById("apikey-input-row").style.display = "flex";
  document.getElementById("apikey-input").value = "";
  document.getElementById("apikey-input").focus();
}

function cancelSetApiKey() {
  document.getElementById("apikey-input-row").style.display = "none";
  document.getElementById("apikey-input").value = "";
}

async function saveApiKey() {
  const key = document.getElementById("apikey-input").value.trim();
  if (!key || key.length < 8) {
    showToast("API Key 至少需要 8 个字符", "error");
    return;
  }
  try {
    const resp = await fetch("/admin/client-key", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${authToken}`,
      },
      body: JSON.stringify({ key }),
    });
    const data = await resp.json();
    if (resp.ok) {
      cancelSetApiKey();
      loadApiKey();
      showToast("密钥已设置", "success");
    } else {
      showToast(data.error || "操作失败", "error");
    }
  } catch (err) {
    showToast("操作失败: " + err.message, "error");
  }
}

async function deleteApiKey() {
  if (!confirm("确定要删除客户端 API Key 吗？\n删除后 /v1/* 接口将无需认证即可访问。")) return;
  try {
    const resp = await fetch("/admin/client-key", {
      method: "DELETE",
      headers: { Authorization: `Bearer ${authToken}` },
    });
    if (resp.ok) {
      loadApiKey();
      showToast("密钥已删除，接口可公开访问", "success");
    }
  } catch (err) {
    showToast("操作失败: " + err.message, "error");
  }
}

function copyApiKey() {
  const text = document.getElementById("apikey-full-text").textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast("已复制到剪贴板", "success");
  }).catch(() => {
    showToast("复制失败，请手动选择复制", "error");
  });
}

// ==================== Modal click-outside ====================
document.getElementById("provider-modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
document.getElementById("password-modal").addEventListener("click", function(e) {
  if (e.target === this) closePwdModal();
});
</script>
